name: SEO Daily Cron (sitemap lastmod + IndexNow ping)

on:
  schedule:
    - cron: '0 3 * * *'  # KST 12:00 (UTC 03:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-sitemap-and-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod to today (KST)
        run: |
          TODAY=$(TZ='Asia/Seoul' date +%F)
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "sitemap.xml lastmod -> ${TODAY}"

      - name: Commit if changed
        run: |
          if ! git diff --quiet sitemap.xml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore(seo): bump sitemap lastmod $(TZ='Asia/Seoul' date +%F)"
            git push
          else
            echo "sitemap.xml unchanged"
          fi

      - name: IndexNow ping (Bing / Yandex / Naver)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY secret not set — skipping ping."
            exit 0
          fi
          BODY=$(cat <<JSON
          {
            "host": "ulsan.pages.dev",
            "key": "${INDEXNOW_KEY}",
            "keyLocation": "https://ulsan.pages.dev/${INDEXNOW_KEY}.txt",
            "urlList": [
              "https://ulsan.pages.dev/",
              "https://ulsan.pages.dev/story.html",
              "https://ulsan.pages.dev/atmosphere.html",
              "https://ulsan.pages.dev/first-visit.html",
              "https://ulsan.pages.dev/access.html",
              "https://ulsan.pages.dev/review.html",
              "https://ulsan.pages.dev/faq.html",
              "https://ulsan.pages.dev/contact.html",
              "https://ulsan.pages.dev/legal/"
            ]
          }
          JSON
          )
          for ENDPOINT in "https://api.indexnow.org/IndexNow" "https://www.bing.com/IndexNow" "https://yandex.com/indexnow"; do
            echo "→ $ENDPOINT"
            curl -sS -o /dev/null -w "HTTP %{http_code}\n" -X POST "$ENDPOINT" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$BODY" || true
          done

      - name: Google sitemap ping
        run: |
          curl -sS -o /dev/null -w "Google ping: %{http_code}\n" "https://www.google.com/ping?sitemap=https://ulsan.pages.dev/sitemap.xml" || true
